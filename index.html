<!DOCTYPE html>
<html>
<head> <title>Snake Game</title> <style>
  body { display: flex; justify-content: center; background: #222; }
  canvas { border: 5px solid white; margin-top: 50px; }
</head> </style>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let snake = [{x: 10, y: 10}]; let food = {x: 15, y: 15};
    let dx = 0, dy = 0;
    setInterval(() => {
      ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
      snake.unshift({x: snake[0].x + dx, y: snake[0].y + dy});
      if(snake[0].x===food.x && snake[0].y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
      else snake.pop();
      ctx.fillStyle = 'red'; ctx.fillRect(food.x*20, food.y*20, 18, 18);
      ctx.fillStyle = 'lime'; snake.forEach(p => ctx.fillRect(p.x*20, p.y*20, 18, 18));
    }, 100);
    document.onkeydown = e => {
      if(e.key==='ArrowUp'&&dy===0){dx=0;dy=-1} if(e.key==='ArrowDown'&&dy===0){dx=0;dy=1}
      if(e.key==='ArrowLeft'&&dx===0){dx=-1;dy=0} if(e.key==='ArrowRight'&&dx===0){dx=1;dy=0}
    };
  </script>
</body>
</html>
